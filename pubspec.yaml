name: recaping
description: "多媒体录音记录应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # 数据库
  sqflite: ^2.3.0
  path: ^1.8.3

  # 音频录制和播放
  record: ^6.2.0
  just_audio: ^0.9.36

  # 相机/图片
  image_picker: ^1.0.7

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 路由
  go_router: ^13.1.0

  # 文件路径
  path_provider: ^2.1.2

  # UI
  flutter_slidable: ^3.0.1

  # 网络
  http: ^1.2.0

  # 工具
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
